{% extends "base.html" %}

{% block title %}SDE — Inscription{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:70vh">
  <div class="card border-0 shadow-sm p-4" style="width:100%;max-width:420px">

    <h4 class="fw-bold mb-1">Créer un compte</h4>
    <p class="text-muted small mb-4">Gratuit — aucune carte bancaire requise.</p>

    <form method="POST" action="{{ url_for('auth.register') }}">

      <div class="mb-3">
        <label for="username" class="form-label small fw-semibold">Identifiant</label>
        <input type="text" id="username" name="username"
               class="form-control" required autofocus
               placeholder="ex : jean_dupont">
        <div class="form-text">Lettres, chiffres et _ uniquement.</div>
      </div>

      <div class="mb-3">
        <label for="name" class="form-label small fw-semibold">Nom affiché</label>
        <input type="text" id="name" name="name"
               class="form-control" required placeholder="Jean Dupont">
      </div>

      <div class="mb-3">
        <label for="email" class="form-label small fw-semibold">Email</label>
        <input type="email" id="email" name="email"
               class="form-control" placeholder="jean@exemple.com">
      </div>

      <div class="mb-3">
        <label for="password" class="form-label small fw-semibold">Mot de passe</label>
        <input type="password" id="password" name="password"
               class="form-control" required placeholder="••••••••" minlength="6">
      </div>

      <div class="mb-4">
        <label for="confirm" class="form-label small fw-semibold">Confirmer le mot de passe</label>
        <input type="password" id="confirm" name="confirm"
               class="form-control" required placeholder="••••••••" minlength="6">
      </div>

      <button type="submit" class="btn btn-sde-teal w-100">
        <i class="bi bi-person-plus me-1"></i>Créer mon compte
      </button>
    </form>

    <hr class="sde-divider my-3">

    <p class="text-center text-muted small mb-0">
      Déjà inscrit ?
      <a href="{{ url_for('auth.login') }}" class="sde-link">Se connecter</a>
    </p>
  </div>
</div>
{% endblock %}
